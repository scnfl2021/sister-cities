<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sister Cities</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
  <style>
  /* ===== FRANCHISE HUB PATCH (forces grid + modal even if styles.css has an error) ===== */

  .franchise-grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(92px, 1fr));
    gap:14px;
    align-items:start;
    margin-top:10px;
  }
  .franchise-item{
    cursor:pointer;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    gap:8px;
    padding:10px 8px;
    border-radius:14px;
    border:1px solid rgba(0,0,0,0.08);
    background:#fff;
    box-shadow:0 6px 18px rgba(0,0,0,0.06);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  .franchise-item:hover{transform:translateY(-2px); box-shadow:0 10px 24px rgba(0,0,0,0.10);}
  .franchise-logoWrap{
    width:58px;height:58px;border-radius:999px;overflow:hidden;
    border:1px solid rgba(0,0,0,0.10);
    display:grid;place-items:center;background:transparent;
  }
  .franchise-logo{width:100%;height:100%;object-fit:contain;display:block;}
  .franchise-name{font-weight:900;font-size:12px;line-height:1.1;color:#0b1220;}

  .franchise-modal{
    display:none; position:fixed; inset:0; z-index:9999;
    background:rgba(0,0,0,0.92);
    align-items:center; justify-content:center; padding:18px;
  }
  .franchise-modal-card{
    width:min(720px, 95vw);
    background:#fff; border-radius:18px;
    box-shadow:0 18px 60px rgba(0,0,0,0.35);
    padding:18px;
  }
  .franchise-modal-head{display:flex;gap:14px;align-items:center;margin-bottom:12px;}
  .franchise-modal-logoWrap{
    width:64px;height:64px;border-radius:999px;overflow:hidden;
    border:1px solid rgba(0,0,0,0.10);
    display:grid;place-items:center;
  }
  .franchise-modal-logo{width:100%;height:100%;object-fit:contain;}
  .franchise-modal-name{font-size:20px;font-weight:950;}
  .franchise-close{
    position:fixed; top:18px; right:22px;
    font-size:38px; color:#fff; cursor:pointer; user-select:none;
  }
</style>
<body>

<header class="header">
  <div class="container">

    <div class="topbar">

      <!-- LEFT: EMPTY -->
      <div class="topbar-left"></div>

      <!-- CENTER: league logo + text -->
      <div class="topbar-center">
        <img
          class="league-logo"
          src="/sister-cities/assets/league-logo.png"
          alt="Sister Cities League Logo"
        />
        <div class="brand-text">
          <div class="brand-title">Sister Cities</div>
          <div class="brand-subtitle">Season 2021–2025</div>
        </div>
      </div>

      <!-- RIGHT: EMPTY -->
      <div class="topbar-right"></div>

    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="season">Season</button>
      <button class="tab" data-tab="gallery">Gallery</button>
      <button class="tab" data-tab="records">All Time Records</button>
      <button class="tab" data-tab="franchise">Franchise Hub</button>
    </div>

  </div>
</header>

<main class="container page">

  <!-- SEASON TAB -->
  <section id="tab-season" class="tabpanel active">
    <div class="season-controls card">
      <div class="season-years">
        <button class="season-year-button active" data-season="2025">2025</button>
        <button class="season-year-button" data-season="2024">2024</button>
        <button class="season-year-button" data-season="2023">2023</button>
        <button class="season-year-button" data-season="2022">2022</button>
        <button class="season-year-button" data-season="2021">2021</button>
      </div>
    </div>

    <div class="card champion-card">
      <div class="card-title">Champion</div>
      <div class="champion-row">
        <div id="championTeam" class="champion-team"></div>
        <div id="championNote" class="champion-note"></div>
      </div>
    </div>

    <div class="card">
      <div class="season-subtabs">
        <button class="season-subtab active" data-subtab="standings">Standings</button>
        <button class="season-subtab" data-subtab="stats">Stats</button>
      </div>

      <div class="season-pane active" data-pane="standings">
        <div id="seasonStandings"></div>
      </div>

      <div class="season-pane" data-pane="stats">
        <div id="seasonStats"></div>
      </div>
    </div>
  </section>

  <!-- GALLERY TAB -->
  <section id="tab-gallery" class="tabpanel">
    <div class="card">
      <div class="card-title">Gallery</div>

      <div class="gallery-grid">
        <!-- Gallery Item -->
        <div class="gallery-item">
          <img
            src="/sister-cities/assets/playoffs-championship-2025.png"
            alt="Playoffs Championship 2025"
            class="gallery-thumb"
          />
          <div class="gallery-caption">Playoffs Championship 2025</div>
        </div>
      </div>

    </div>
  </section>

  <!-- FULLSCREEN IMAGE MODAL -->
  <div id="galleryModal" class="gallery-modal">
    <span class="gallery-close">&times;</span>
    <img class="gallery-modal-img" id="galleryModalImg">
    <div class="gallery-modal-caption" id="galleryModalCaption"></div>
  </div>

  <!-- ALL TIME RECORDS TAB -->
  <section id="tab-records" class="tabpanel">
    <div class="card">
      <div class="card-title">All Time Records</div>
      <div id="allTimeRecordsContainer"></div>
    </div>
  </section>

  <!-- FRANCHISE HUB TAB -->
  <section id="tab-franchise" class="tabpanel">
    <div class="card">
      <div class="card-title">Franchise Hub</div>

      <!-- Team logo grid will be generated by script.js -->
      <div id="franchiseGrid" class="franchise-grid"></div>
    </div>
  </section>

  <!-- FRANCHISE PROFILE MODAL (placeholder content for now) -->
<div id="franchiseModal" class="franchise-modal" aria-hidden="true" style="display:none;">   
  <span class="franchise-close" id="franchiseClose">&times;</span>

    <div class="franchise-modal-card">
      <div class="franchise-modal-head">
        <div class="franchise-modal-logoWrap">
          <img id="franchiseModalLogo" class="franchise-modal-logo" alt="Team logo" />
        </div>
        <div>
          <div id="franchiseModalName" class="franchise-modal-name"></div>
          <div id="franchiseModalOwner" class="franchise-modal-owner muted"></div>
        </div>
      </div>

      <div class="franchise-modal-body muted">
        Profile coming soon.
      </div>
    </div>
  </div>

</main>

<footer class="footer">
  Built for your Sister Cities fantasy league • Hosted on GitHub Pages
</footer>

<script src="./script.js"></script>
</body>
</html>
